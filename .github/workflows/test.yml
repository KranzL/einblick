name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/pyproject.toml

      - name: Install
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run pytest
        working-directory: scripts
        run: pytest -q
