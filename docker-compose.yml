services:
  sqlscout:
    image: ghcr.io/kranzl/sqlscout:latest
    env_file:
      - .env
    volumes:
      - ./reports:/workspace/reports
      - ./history:/home/sqlscout/.sqlscout/history
    command:
      - analyze
      - --platform
      - snowflake
      - --days
      - "7"
      - --analysis-depth
      - standard
      - --slack-mode
      - alert
      - --output
      - /workspace/reports/sqlscout.md
