services:
  einblick:
    image: ghcr.io/kranzl/einblick:latest
    env_file:
      - .env
    volumes:
      - ./reports:/workspace/reports
      - ./history:/home/einblick/.einblick/history
    command:
      - analyze
      - --platform
      - snowflake
      - --days
      - "7"
      - --analysis-depth
      - standard
      - --slack-mode
      - alert
      - --output
      - /workspace/reports/einblick.md
